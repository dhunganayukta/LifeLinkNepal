{% extends "base.html" %}

{% block title %}Donor Dashboard{% endblock %}

{% block content %}
<div class="container mt-5">
  <h1>Donor Dashboard</h1>
  <p>Welcome, {{ user.username }}! Here you can view your profile and manage your donations.</p>

  <div class="row mt-4">
    <div class="col-md-6">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">Update Profile</h5>
          <a href="{% url 'donors_profile' %}" class="btn btn-primary">Go</a>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">View Blood Requests</h5>
          <a href="{% url 'requests_home' %}" class="btn btn-danger">Go</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
