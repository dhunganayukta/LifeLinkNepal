{% extends "base.html" %}

{% block title %}Blood Requests Dashboard{% endblock %}

{% block content %}
<div class="container mt-5">
  <h1>Blood Requests Dashboard</h1>
  <p>Manage emergency requests and alerts.</p>

  <div class="row mt-4">
    <div class="col-md-6">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">Send Emergency Alert</h5>
          <a href="{% url 'emergency' %}" class="btn btn-warning">Go</a>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">View All Requests</h5>
          <a href="{% url 'requests_list' %}" class="btn btn-danger">Go</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
